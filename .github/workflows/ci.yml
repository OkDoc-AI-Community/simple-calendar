name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Detect library
        id: lib
        run: |
          node -e "
            const a = require('./angular.json');
            const libs = Object.entries(a.projects).filter(([,p]) => p.projectType === 'library');
            if (libs.length !== 1) { console.error('Expected 1 library, found ' + libs.length); process.exit(1); }
            require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'name=' + libs[0][0] + '\n');
          "

      - name: Build library
        run: npx ng build ${{ steps.lib.outputs.name }} --configuration production
