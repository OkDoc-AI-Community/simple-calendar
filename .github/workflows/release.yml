name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write # Required for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Detect library
        id: lib
        run: |
          node -e "
            const a = require('./angular.json');
            const libs = Object.entries(a.projects).filter(([,p]) => p.projectType === 'library');
            if (libs.length !== 1) { console.error('Expected 1 library, found ' + libs.length); process.exit(1); }
            const [name, config] = libs[0];
            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'name=' + name + '\n');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'root=' + config.root + '\n');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'dist=dist/' + name + '\n');
          "

      - name: Verify version match
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./${{ steps.lib.outputs.root }}/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match library package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build library
        run: npx ng build ${{ steps.lib.outputs.name }} --configuration production

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      # Everything up to here runs was on Node 22
      # Now switch to Node 24 for the publish step to get the latest npm CLI with improved provenance support
      # Note: This is needed to push to npmjs with Trusted Publishing option (which requires npm >22)
      # TODO: After upgrading fully to Node 24, you can remove these steps of switch and install

      - name: Switch to Node 24 for publish (newer npm CLI)
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Update npm to ensure latest (optional safety net)
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish ${{ steps.lib.outputs.dist }}/ --provenance --access public
